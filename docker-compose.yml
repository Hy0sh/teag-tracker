services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: teg
      POSTGRES_PASSWORD: teg
      POSTGRES_DB: teg
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teg"]
      interval: 3s
      timeout: 3s
      retries: 10

  # Dashboard web (React + API Hono). `docker compose up`
  # Migre + seed la base (depuis data/ si vide), puis sert.
  dashboard:
    build:
      context: .
      target: dev # conteneur de DÉVELOPPEMENT (HMR), pas l'image de prod (stage `runtime`)
    # migration -> collecte (best-effort) -> API (tsx watch) en fond + Vite (HMR) au premier plan
    command: sh -c "npm run db:setup && (npm run collect || echo 'Collecte échouée — on continue') && (npm run dev:serve & npm run dev:web)"
    ports:
      - "3000:3000" # API Hono
      - "5173:5173" # front Vite (HMR) — c'est ici qu'on développe
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://teg:teg@postgres:5432/teg
      # Source des taux : par défaut l'API publique BCE (aucune clé). Override optionnel.
      - RATE_SOURCE_URL=${RATE_SOURCE_URL:-}
      - RATE_SOURCE_KEY=${RATE_SOURCE_KEY:-}
      - VITE_USE_POLLING=true # détection des changements de fichiers via volume Docker
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./web:/app/web
      - ./data:/app/data
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./vite.config.ts:/app/vite.config.ts

  # Collecte one-shot des taux (pour un cron). `docker compose run --rm collect`
  collect:
    build: .
    profiles: ["tools"]
    command: npm run collect
    environment:
      - DATABASE_URL=postgres://teg:teg@postgres:5432/teg
      - RATE_SOURCE_URL=${RATE_SOURCE_URL:-}
      - RATE_SOURCE_KEY=${RATE_SOURCE_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
